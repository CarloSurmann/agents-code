# Usage:
#   docker-compose up -d                    # start all customers
#   docker-compose up pizzeria-mario        # start one customer
#   docker-compose logs -f pizzeria-mario   # view logs
#   docker-compose down                     # stop all
#
# First time:
#   docker-compose build
# =============================================================================

